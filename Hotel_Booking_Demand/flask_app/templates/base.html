<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hotel Booking Analytics Platform</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- ================= Navbar ================= -->

<nav class="navbar navbar-dark bg-primary shadow-sm fixed-top">

    <div class="container-fluid">

        <span class="navbar-brand fw-bold">

            <i class="bi bi-bar-chart-fill"></i>

            Hotel Booking Demand Analytics Platform

        </span>

    </div>

</nav>

<!-- ================= Sidebar ================= -->

<div class="sidebar">

    <h5 class="text-center text-white mt-4 mb-4">

        Navigation

    </h5>

    <ul class="nav flex-column">

        <li class="nav-item">

            <a class="nav-link" href="/">

                <i class="bi bi-speedometer2"></i>

                Dashboard

            </a>

        </li>

        <li class="nav-item">

            <a class="nav-link" href="/booking">

                <i class="bi bi-calendar-check"></i>

                Booking Analytics

            </a>

        </li>

        <li class="nav-item">

            <a class="nav-link" href="/customer">

                <i class="bi bi-people-fill"></i>

                Customer Analytics

            </a>

        </li>

        <li class="nav-item">

            <a class="nav-link" href="/cancellation">

                <i class="bi bi-x-circle"></i>

                Cancellation Analytics

            </a>

        </li>

        <li class="nav-item">

            <a class="nav-link" href="/revenue">

                <i class="bi bi-cash-stack"></i>

                Revenue Analytics

            </a>

        </li>

        <li class="nav-item">

            <a class="nav-link" href="/statistics">

                <i class="bi bi-graph-up-arrow"></i>

                Statistical Analysis

            </a>

        </li>

        <li class="nav-item">

            <a class="nav-link"

            href="/explorer">

                <i class="bi bi-table"></i>

                Data Explorer

            </a>

        </li>

        <li class="nav-item">

            <a class="nav-link" href="/reports">

                <i class="bi bi-file-earmark-text"></i>

                Reports

            </a>

        </li>

    </ul>

</div>

<!-- ================= Main Content ================= -->

<div class="main-content">

    {% block content %}
    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const current = window.location.pathname;

document.querySelectorAll(".sidebar .nav-link").forEach(link => {

    if(link.getAttribute("href") === current){

        link.classList.add("active");

    }

});

</script>

</body>

</html>
