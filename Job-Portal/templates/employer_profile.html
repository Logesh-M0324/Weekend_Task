{% extends "base.html" %}

{% block title %}
Company Profile
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-9">

        <div class="card shadow border-0">

            <div class="card-header bg-primary text-white py-3">

                <h3 class="mb-0">

                    <i class="bi bi-building"></i>

                    Company Profile

                </h3>

            </div>

            <div class="card-body p-4">

                <div class="text-center mb-4">

                    {% if employer["company_logo"] %}

                        <img
                            src="{{ url_for('static', filename='uploads/company_logos/' + employer['company_logo']) }}"
                            class="rounded-circle border shadow"
                            width="160"
                            height="160"
                            style="object-fit:cover;">

                    {% else %}

                        <div
                            class="rounded-circle bg-light d-inline-flex align-items-center justify-content-center border shadow"
                            style="width:160px;height:160px;">

                            <i class="bi bi-building display-2 text-secondary"></i>

                        </div>

                    {% endif %}

                </div>

                <form
                    method="POST"
                    enctype="multipart/form-data">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-semibold">

                                Company Name

                            </label>

                            <input
                                type="text"
                                name="company_name"
                                class="form-control"
                                value="{{ employer['company_name'] or '' }}"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-semibold">

                                Company Location

                            </label>

                            <input
                                type="text"
                                name="company_location"
                                class="form-control"
                                value="{{ employer['company_location'] or '' }}">

                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            Company Website

                        </label>

                        <input
                            type="url"
                            name="company_website"
                            class="form-control"
                            placeholder="https://example.com"
                            value="{{ employer['company_website'] or '' }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            Company Description

                        </label>

                        <textarea
                            name="company_description"
                            rows="6"
                            class="form-control"
                            placeholder="Tell candidates about your company...">{{ employer["company_description"] or "" }}</textarea>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            Company Logo

                        </label>

                        <input
                            type="file"
                            name="company_logo"
                            class="form-control">

                        <small class="text-muted">

                            PNG, JPG and JPEG only.

                        </small>

                    </div>

                    <div class="d-flex gap-2">

                        <button
                            class="btn btn-primary">

                            <i class="bi bi-check-circle-fill"></i>

                            Save Company Profile

                        </button>

                        <a
                            href="{{ url_for('employer_dashboard') }}"
                            class="btn btn-secondary">

                            Cancel

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
