{% extends "base.html" %}

{% block title %}
Post Job
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow border-0">

            <div class="card-header bg-primary text-white py-3">

                <h3 class="mb-0">

                    <i class="bi bi-briefcase-fill"></i>

                    Post a New Job

                </h3>

            </div>

            <div class="card-body p-4">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            Company Name

                        </label>

                        <input
                            type="text"
                            name="company_name"
                            class="form-control"
                            placeholder="Enter company name"
                            value="{{ request.form.get('company_name', '') }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            Job Title

                        </label>

                        <input
                            type="text"
                            name="job_title"
                            class="form-control"
                            placeholder="Enter job title"
                            value="{{ request.form.get('job_title', '') }}"
                            required>

                    </div>

                    <div class="row">

                        <div class="col-md-6">

                            <div class="mb-3">

                                <label class="form-label fw-semibold">

                                    Location

                                </label>

                                <input
                                    type="text"
                                    name="location"
                                    class="form-control"
                                    placeholder="e.g. Chennai"
                                    value="{{ request.form.get('location', '') }}"
                                    required>

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="mb-3">

                                <label class="form-label fw-semibold">

                                    Experience

                                </label>

                                <input
                                    type="text"
                                    name="experience"
                                    class="form-control"
                                    placeholder="e.g. 2 Years"
                                    value="{{ request.form.get('experience', '') }}"
                                    required>

                            </div>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6">

                            <div class="mb-3">

                                <label class="form-label fw-semibold">

                                    Salary

                                </label>

                                <input
                                    type="text"
                                    name="salary"
                                    class="form-control"
                                    placeholder="e.g. ₹8 LPA"
                                    value="{{ request.form.get('salary', '') }}"
                                    required>

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="mb-3">

                                <label class="form-label fw-semibold">

                                    Skills

                                </label>

                                <input
                                    type="text"
                                    name="skills"
                                    class="form-control"
                                    placeholder="Python, Flask, SQL"
                                    value="{{ request.form.get('skills', '') }}"
                                    required>

                            </div>

                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            Job Description

                        </label>

                        <textarea
                            name="description"
                            rows="6"
                            class="form-control"
                            placeholder="Describe the job responsibilities, requirements and expectations..."
                            required>{{ request.form.get('description', '') }}</textarea>

                    </div>

                    <div class="d-flex gap-2">

                        <button
                            type="submit"
                            class="btn btn-primary">

                            <i class="bi bi-plus-circle-fill"></i>

                            Post Job

                        </button>

                        <a
                            href="{{ url_for('employer_dashboard') }}"
                            class="btn btn-secondary">

                            <i class="bi bi-x-circle"></i>

                            Cancel

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
