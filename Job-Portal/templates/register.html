{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6 col-md-8">

        <div class="card shadow border-0">

            <div class="card-header bg-primary text-white text-center py-3">

                <h3 class="mb-0">

                    <i class="bi bi-person-plus-fill"></i>

                    Create Account

                </h3>

            </div>

            <div class="card-body p-4">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            Full Name

                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            placeholder="Enter your full name"
                            value="{{ request.form.get('name', '') }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            Email Address

                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter your email"
                            value="{{ request.form.get('email', '') }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            Password

                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Create a password"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            Register As

                        </label>

                        <select
                            name="role"
                            class="form-select"
                            required>

                            <option value="">
                                Select Role
                            </option>

                            <option
                                value="Employer"
                                {% if request.form.get('role') == 'Employer' %}selected{% endif %}>

                                Employer

                            </option>

                            <option
                                value="Candidate"
                                {% if request.form.get('role') == 'Candidate' %}selected{% endif %}>

                                Candidate

                            </option>

                        </select>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        <i class="bi bi-person-check-fill"></i>

                        Create Account

                    </button>

                </form>

                <hr>

                <p class="text-center mb-0">

                    Already have an account?

                    <a
                        href="{{ url_for('login') }}"
                        class="text-decoration-none fw-semibold">

                        Login Here

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
